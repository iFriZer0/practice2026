syntax = "proto3";

package rs485.service.v1;

service Rs485Service {
  rpc SendData(SendDataRequest) returns (SendDataResponse);

  rpc Subscribe(SubscribeRequest)
      returns (stream ReceiveDataResponse);
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  NO_ERROR = 1;
  INVALID_CHANNEL_ID = 2;
  INVALID_DATA = 3;
  DRIVER_NOT_CONNECTED = 4;
  DRIVER_NO_REPLY = 5;
  DRIVER_TIMEOUT = 6;
  DRIVER_ERROR = 7;
  INTERNAL_ERROR = 8;
}

message SendDataRequest {
  uint32 channel_id = 1;
  bytes data = 2;
}

message SendDataResponse {
  bool success = 1;
  uint32 channel_id = 2;
  ErrorCode error_code = 3;
  string error_message = 4;
}

message SubscribeRequest {
}

message ReceiveDataResponse {
  bool success = 1;
  uint32 channel_id = 2;
  bytes data = 3;
  ErrorCode error_code = 4;
  string error_message = 5;
}